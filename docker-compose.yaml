
services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: .
      POSTGRES_DB: energy_db
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - timescaledb

volumes:
  timescale_data: